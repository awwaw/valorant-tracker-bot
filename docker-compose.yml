services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: valorant_tracker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    image: ghcr.io/wawawa/valorant-tracker-bot:latest
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      HENRIK_API_KEY: ${HENRIK_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: